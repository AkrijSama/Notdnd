<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Inkborne">
  <!--
    Favicons render WITHOUT page CSS, so currentColor can't theme-invert here — a
    media query bakes both treatments: ink-dark (#16233a, the owner's brand ink) on a
    light tab bar, paper-light on a dark one. DROP-IN REPLACE with the owner's mark;
    keep this <style> block (or its two fills) so the icon stays visible in both.
  -->
  <style>
    .mark { fill: #16233a; }
    @media (prefers-color-scheme: dark) { .mark { fill: #e9e2d0; } }
  </style>
  <g class="mark">
    <path d="M32 4 L36 20 L34 45 L30 45 L28 20 Z"/>
    <rect x="16" y="43" width="32" height="4" rx="2"/>
    <rect x="30" y="47" width="4" height="9"/>
    <circle cx="32" cy="57" r="3.4"/>
    <path d="M39 28 q8 -3 10 4 q2 7 -5 8 q-6 0 -5 -7 q0 -3 0 -5 Z"/>
    <circle cx="51" cy="22" r="2.1"/>
    <circle cx="46" cy="39" r="1.5"/>
    <g transform="translate(64,0) scale(-1,1)">
      <path d="M39 28 q8 -3 10 4 q2 7 -5 8 q-6 0 -5 -7 q0 -3 0 -5 Z"/>
      <circle cx="51" cy="22" r="2.1"/>
      <circle cx="46" cy="39" r="1.5"/>
    </g>
  </g>
</svg>
