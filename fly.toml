app = "notdnd-soliddark"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4173"
  NOTDND_HOST = "0.0.0.0"
  NOTDND_DB_PATH = "/data/notdnd.db.json"
  NOTDND_MEMORY_ROOT = "/data/campaigns"
  NOTDND_WAITLIST_PATH = "/data/waitlist.json"

# Single process group; Fly restarts the process automatically if it exits.
[processes]
  app = "node server/index.js"

[http_service]
  internal_port = 4173
  force_https = true
  # Keep the instance up for the whole session — never auto-stop/suspend mid-play.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "20s"
  interval = "15s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[mounts]]
  source = "notdnd_data"
  destination = "/data"
