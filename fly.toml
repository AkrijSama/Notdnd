app = "notdnd-soliddark"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4173"
  NOTDND_HOST = "0.0.0.0"
  NOTDND_DB_PATH = "/data/notdnd.db.json"
  NOTDND_MEMORY_ROOT = "/data/campaigns"
  NOTDND_WAITLIST_PATH = "/data/waitlist.json"

[http_service]
  internal_port = 4173
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "20s"
  interval = "15s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[mounts]]
  source = "notdnd_data"
  destination = "/data"
