version: "3.9"
services:
  notdnd:
    build: .
    # Auto-restart the container if the Node process crashes or exits abnormally,
    # so players never hit a dead server (survives daemon restarts too).
    restart: always
    ports:
      - "4173:4173"
    environment:
      - PORT=4173
      - NOTDND_BOOTSTRAP_EMAIL=demo@notdnd.local
      - NOTDND_BOOTSTRAP_PASSWORD=demo1234
      - NOTDND_DB_PATH=/data/notdnd.db.json
    volumes:
      - notdnd_data:/data

volumes:
  notdnd_data:
